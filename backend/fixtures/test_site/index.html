<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopLab - 首页</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f7f8fa; color: #1f2937; line-height: 1.6; }
  header { background: #111827; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  header nav a { color: #d1d5db; text-decoration: none; margin-left: 20px; font-size: 14px; }
  header nav a:hover { color: #fff; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }
  .hero { text-align: center; margin-bottom: 32px; }
  .hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .hero p { color: #6b7280; font-size: 15px; }
  .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
  .product-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid #e5e7eb; }
  .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background: #f3f4f6; }
  .product-card .placeholder-img { width: 100%; height: 160px; border-radius: 8px; margin-bottom: 12px; background: linear-gradient(135deg, #e0e7ff, #f3e8ff); display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .product-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .product-card .price { font-size: 18px; font-weight: 700; color: #2563eb; margin-bottom: 12px; }
  .product-card .desc { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
  .btn { display: inline-block; padding: 9px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all .15s; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .featured-banner { background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 16px; margin-bottom: 24px; font-size: 14px; color: #92400e; }
</style>
</head>
<body>

<header>
  <h1>🛍️ ShopLab</h1>
  <nav>
    <a href="index.html">首页</a>
    <a href="product.html">商品</a>
    <a href="checkout.html">结算</a>
  </nav>
</header>

<div class="container">
  <div class="hero">
    <h2>精选好物，一键下单</h2>
    <p>限时优惠，全场包邮（详见结算页）</p>
  </div>

  <div class="featured-banner">
    ⚠️ 本站为 Synthetic User Lab 测试站点，用于模拟真实电商购物流程中的 UX 摩擦场景。
  </div>

  <div class="products">
    <div class="product-card">
      <div class="placeholder-img">🎧</div>
      <h3>无线降噪耳机 Pro</h3>
      <div class="price">¥899</div>
      <p class="desc">主动降噪，30 小时续航，舒适佩戴。</p>
      <a href="product.html" class="btn btn-primary">查看详情</a>
    </div>

    <div class="product-card">
      <div class="placeholder-img">⌚</div>
      <h3>智能手表 Series 5</h3>
      <div class="price">¥1,299</div>
      <p class="desc">心率监测，GPS 定位，50 米防水。</p>
      <a href="product.html" class="btn btn-primary">查看详情</a>
    </div>

    <div class="product-card">
      <div class="placeholder-img">🖱️</div>
      <h3>人体工学鼠标</h3>
      <div class="price">¥299</div>
      <p class="desc">无线双模，多档 DPI，长时间使用不累手。</p>
      <a href="product.html" class="btn btn-primary">查看详情</a>
    </div>
  </div>
</div>

</body>
</html>
