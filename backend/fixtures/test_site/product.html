<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无线降噪耳机 Pro - ShopLab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f7f8fa; color: #1f2937; line-height: 1.6; }
  header { background: #111827; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  header nav a { color: #d1d5db; text-decoration: none; margin-left: 20px; font-size: 14px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 16px; }
  .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .product-image { background: linear-gradient(135deg, #e0e7ff, #f3e8ff); border-radius: 12px; height: 360px; display: flex; align-items: center; justify-content: center; font-size: 100px; }
  .product-info h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .product-info .price { font-size: 28px; font-weight: 700; color: #2563eb; margin-bottom: 16px; }
  .product-info .original-price { font-size: 16px; color: #9ca3af; text-decoration: line-through; margin-left: 8px; }
  .product-info .desc { font-size: 14px; color: #4b5563; margin-bottom: 20px; line-height: 1.7; }
  .product-info ul { margin: 0 0 20px 20px; font-size: 14px; color: #4b5563; }
  .product-info ul li { margin-bottom: 4px; }
  .qty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .qty-row label { font-size: 14px; font-weight: 500; }
  .qty-row select { padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
  .btn { display: inline-block; padding: 11px 28px; border: none; border-radius: 6px; font-size: 15px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all .15s; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .coupon-box { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-top: 20px; }
  .coupon-box label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #374151; }
  .coupon-row { display: flex; gap: 8px; }
  .coupon-row input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
  .coupon-row button { padding: 8px 16px; background: #6b7280; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
  .coupon-msg { font-size: 13px; margin-top: 8px; min-height: 18px; }
  .coupon-msg.error { color: #dc2626; }
  .coupon-msg.success { color: #059669; }
</style>
</head>
<body>

<header>
  <h1>🛍️ ShopLab</h1>
  <nav>
    <a href="index.html">首页</a>
    <a href="product.html">商品</a>
    <a href="checkout.html">结算</a>
  </nav>
</header>

<div class="container">
  <div class="product-layout">
    <div class="product-image">🎧</div>
    <div class="product-info">
      <h2>无线降噪耳机 Pro</h2>
      <div class="price">¥899<span class="original-price">¥1099</span></div>
      <p class="desc">主动降噪，30 小时续航，舒适佩戴。采用新一代蓝牙 5.3 芯片，连接更稳定，延迟更低。</p>
      <ul>
        <li>主动降噪（ANC）</li>
        <li>30 小时超长续航</li>
        <li>蓝牙 5.3 多设备切换</li>
        <li>IPX4 防水</li>
      </ul>

      <div class="qty-row">
        <label for="qty">数量</label>
        <select id="qty" data-testid="qty-select">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>

      <a href="checkout.html" class="btn btn-primary" data-testid="buy-now">立即购买</a>

      <div class="coupon-box">
        <label for="coupon-input">优惠券码</label>
        <div class="coupon-row">
          <input type="text" id="coupon-input" data-testid="coupon-input" placeholder="输入优惠券码"/>
          <button id="coupon-apply" data-testid="coupon-apply">应用</button>
        </div>
        <div class="coupon-msg" id="coupon-msg" data-testid="coupon-msg"></div>
      </div>
    </div>
  </div>
</div>

<script>
// 摩擦点：优惠券输入框只接受一个非常态的码，且错误提示模糊
// 正确码 "SHOP10" 打 9 折，其他任何输入都只显示"优惠券无效"
document.getElementById('coupon-apply').addEventListener('click', () => {
  const val = document.getElementById('coupon-input').value.trim();
  const msg = document.getElementById('coupon-msg');
  if (val === 'SHOP10') {
    msg.className = 'coupon-msg success';
    msg.textContent = '优惠券已应用：立减 ¥89.9';
  } else if (!val) {
    // 摩擦点：空输入时什么都不提示，用户不知道发生了什么
    msg.className = 'coupon-msg';
    msg.textContent = '';
  } else {
    msg.className = 'coupon-msg error';
    // 摩擦点：模糊错误提示，不告诉用户问题在哪
    msg.textContent = '操作失败，请重试';
  }
});
</script>

</body>
</html>
